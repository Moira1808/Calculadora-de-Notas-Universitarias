<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Notas Universitarias</title>
    <style>
        :root {
            --lila-claro: #f3e8ff;
            --lila-medio: #d8b4fe;
            --lila-principal: #a855f7;
            --lila-oscuro: #7e22ce;
            --texto: #4c1d95;
            --rojo-borrar: #ef4444;
            --rojo-hover: #dc2626;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--lila-claro);
            color: var(--texto);
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            color: var(--lila-oscuro);
            margin-bottom: 30px;
        }

        /* Formulario para agregar materia */
        .add-subject-container {
            background-color: var(--blanco);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(168, 85, 247, 0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
        }

        .add-subject-container input {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--lila-medio);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            color: var(--texto);
        }

        .add-subject-container input:focus {
            border-color: var(--lila-principal);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: var(--lila-principal);
            color: var(--blanco);
            padding: 10px 20px;
            font-size: 16px;
        }

        .btn-primary:hover {
            background-color: var(--lila-oscuro);
        }

        /* Tarjetas de Materias (Una debajo de la otra) */
        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .subject-card {
            background-color: var(--blanco);
            border-top: 5px solid var(--lila-principal);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(168, 85, 247, 0.1);
        }

        .subject-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--lila-claro);
            padding-bottom: 10px;
        }

        .subject-header h2 {
            margin: 0;
            color: var(--lila-oscuro);
        }

        .btn-delete-sm {
            background-color: var(--rojo-borrar);
            color: var(--blanco);
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 5px;
        }

        .btn-delete-sm:hover { background-color: var(--rojo-hover); }

        /* Evaluaciones */
        .eval-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .eval-row input {
            padding: 8px;
            border: 1px solid var(--lila-medio);
            border-radius: 6px;
            outline: none;
        }

        .eval-name { flex-grow: 1; min-width: 150px; }
        .eval-grade, .eval-weight { width: 80px; text-align: center; }

        .btn-add-eval {
            background-color: var(--lila-medio);
            color: var(--lila-oscuro);
            padding: 8px 15px;
            margin-top: 10px;
            font-size: 14px;
        }
        .btn-add-eval:hover { background-color: #c084fc; color: white; }

        .btn-remove-eval {
            background-color: transparent;
            color: var(--rojo-borrar);
            font-size: 18px;
            padding: 0 5px;
        }

        /* Resumen de la materia */
        .subject-summary {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed var(--lila-medio);
            background-color: #faf5ff;
            padding: 15px;
            border-radius: 8px;
        }

        .summary-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .status-message {
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
        }

        .status-pass { background-color: #dcfce7; color: #166534; }
        .status-need { background-color: #fee2e2; color: #991b1b; }

        /* Botón de reset al final */
        .reset-container {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--lila-medio);
            text-align: center;
        }

        .btn-reset-all {
            background-color: var(--rojo-borrar);
            color: var(--blanco);
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            opacity: 0.9;
        }
        .btn-reset-all:hover { opacity: 1; }

    </style>
</head>
<body>

    <h1>✨ Mi Calculadora de Notas</h1>

    <div class="add-subject-container">
        <input type="text" id="newSubjectName" placeholder="Escribe el nombre de la materia (Ej. Anatomía)..." onkeypress="handleKeyPress(event)">
        <button class="btn-primary" onclick="addSubject()">Agregar Materia</button>
    </div>

    <div id="subjectsContainer" class="subjects-list">
        </div>

    <div class="reset-container">
        <p style="font-size: 12px; color: var(--lila-principal);">Peligro: Esto borrará todas las materias y notas.</p>
        <button class="btn-reset-all" onclick="resetAll()">🗑️ Borrar todo y empezar trimestre de cero</button>
    </div>

    <script>
        // La meta para pasar según el sistema venezolano universitario suele ser 9.5
        const GOAL_POINTS = 9.5;

        // Cargar datos de LocalStorage o inicializar vacío
        let subjects = JSON.parse(localStorage.getItem('userSubjects')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('userSubjects', JSON.stringify(subjects));
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') addSubject();
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function addSubject() {
            const input = document.getElementById('newSubjectName');
            const name = input.value.trim();
            
            if (name === "") return alert("Por favor ingresa un nombre para la materia");

            subjects.push({
                id: generateId(),
                name: name,
                evaluations: [
                    // Empezamos con una evaluación vacía por defecto
                    { id: generateId(), name: 'Parcial 1', grade: 0, weight: 20 }
                ]
            });

            input.value = "";
            saveToLocalStorage();
            render();
        }

        function deleteSubject(subjectId) {
            if (confirm("¿Segura que quieres eliminar esta materia por completo?")) {
                subjects = subjects.filter(s => s.id !== subjectId);
                saveToLocalStorage();
                render();
            }
        }

        function addEvaluation(subjectId) {
            const subject = subjects.find(s => s.id === subjectId);
            subject.evaluations.push({ id: generateId(), name: 'Nueva Evaluación', grade: 0, weight: 0 });
            saveToLocalStorage();
            render();
        }

        function deleteEvaluation(subjectId, evalId) {
            const subject = subjects.find(s => s.id === subjectId);
            subject.evaluations = subject.evaluations.filter(e => e.id !== evalId);
            saveToLocalStorage();
            render();
        }

        function updateEval(subjectId, evalId, field, value) {
            const subject = subjects.find(s => s.id === subjectId);
            const evaluation = subject.evaluations.find(e => e.id === evalId);
            
            if (field === 'name') {
                evaluation[field] = value;
            } else {
                // Convertir a número para cálculos (evitar errores si dejan en blanco)
                let num = parseFloat(value);
                if (isNaN(num)) num = 0;
                evaluation[field] = num;
            }
            
            saveToLocalStorage();
            render();
        }

        function resetAll() {
            if (confirm("¡ATENCIÓN! ¿Estás segura de que quieres borrar TODAS las materias y empezar el trimestre desde cero? Esto no se puede deshacer.")) {
                subjects = [];
                saveToLocalStorage();
                render();
            }
        }

        function render() {
            const container = document.getElementById('subjectsContainer');
            container.innerHTML = '';

            subjects.forEach(subject => {
                let totalWeight = 0;
                let totalPoints = 0;

                let evalsHTML = subject.evaluations.map(ev => {
                    totalWeight += ev.weight;
                    // Formula: (Nota * Peso%) / 100
                    let points = (ev.grade * ev.weight) / 100;
                    totalPoints += points;

                    return `
                        <div class="eval-row">
                            <input type="text" class="eval-name" value="${ev.name}" placeholder="Nombre (Ej. Taller)" onchange="updateEval('${subject.id}', '${ev.id}', 'name', this.value)">
                            <input type="number" class="eval-grade" value="${ev.grade || ''}" placeholder="Nota (0-20)" min="0" max="20" step="0.1" onchange="updateEval('${subject.id}', '${ev.id}', 'grade', this.value)">
                            <input type="number" class="eval-weight" value="${ev.weight || ''}" placeholder="% Peso" min="0" max="100" onchange="updateEval('${subject.id}', '${ev.id}', 'weight', this.value)">
                            <span>%</span>
                            <button class="btn-remove-eval" onclick="deleteEvaluation('${subject.id}', '${ev.id}')" title="Borrar evaluación">✖</button>
                        </div>
                    `;
                }).join('');

                let pointsNeeded = GOAL_POINTS - totalPoints;
                let statusHTML = '';

                if (pointsNeeded <= 0) {
                    statusHTML = `<div class="status-message status-pass">¡Felicidades! Ya pasaste la materia con ${totalPoints.toFixed(2)} pts 🎉</div>`;
                } else {
                    statusHTML = `<div class="status-message status-need">Te faltan <b>${pointsNeeded.toFixed(2)}</b> puntos para llegar a ${GOAL_POINTS} 📚</div>`;
                }

                const cardHTML = `
                    <div class="subject-card">
                        <div class="subject-header">
                            <h2>${subject.name}</h2>
                            <button class="btn-delete-sm" onclick="deleteSubject('${subject.id}')">Eliminar Materia</button>
                        </div>
                        
                        <div class="evaluations-container">
                            <div class="eval-row" style="font-weight: bold; margin-bottom: 5px;">
                                <div class="eval-name" style="border: none;">Evaluación</div>
                                <div class="eval-grade" style="border: none;">Nota (20)</div>
                                <div class="eval-weight" style="border: none; margin-right:20px;">Peso %</div>
                            </div>
                            ${evalsHTML}
                        </div>
                        
                        <button class="btn btn-add-eval" onclick="addEvaluation('${subject.id}')">+ Agregar evaluación</button>

                        <div class="subject-summary">
                            <div class="summary-text">
                                <span>Porcentaje evaluado:</span>
                                <span style="color: ${totalWeight > 100 ? 'red' : 'inherit'}">${totalWeight.toFixed(0)}% / 100%</span>
                            </div>
                            <div class="summary-text">
                                <span>Puntos acumulados:</span>
                                <span>${totalPoints.toFixed(2)} / 20 pts</span>
                            </div>
                            ${statusHTML}
                        </div>
                    </div>
                `;
                
                container.innerHTML += cardHTML;
            });
        }

        // Renderizar por primera vez al abrir la página
        render();
    </script>
</body>
</html>
